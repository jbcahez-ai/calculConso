<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Le Voyage Heure - Calculateur</title>
  <link rel="stylesheet" href="CSS/style.css">
</head>
<body>

<div class="container">
  <h1>Le Voyage Heure</h1>

  <label>Nombre de personnes</label>
  <input type="number" id="people">

  <label>⏱️ Horaires</label>
  <div style="display: flex; gap: 10px; margin-top: 5px;">
    <div style="flex: 1;">
      <label style="display: block; font-size: 12px; color: #F2AA1B;">Arrivée (HH:MM)</label>
      <input type="text" id="arrivalTime" placeholder="1430" maxlength="5" style="width: 100%;" onblur="formatTime(this)" oninput="updateDuration()">
    </div>
    <div style="flex: 1;">
      <label style="display: block; font-size: 12px; color: #F2AA1B;">Départ (HH:MM)</label>
      <input type="text" id="departureTime" placeholder="1845" maxlength="5" style="width: 100%;" onblur="formatTime(this)" oninput="updateDuration()">
    </div>
  </div>
  <div style="margin-top: 5px; padding: 10px; background: #111; border-radius: 8px; text-align: center; color: #F2AA1B;">
    Durée : <strong id="durationDisplay">--</strong> min
  </div>

  <label style="margin-top: 15px; display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
    <span>📍 À déduire</span>
    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
      <input type="checkbox" id="escape" onchange="updateDuration()">
      <span>Escape</span>
    </label>
    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
      <input type="checkbox" id="haches" onchange="updateDuration()">
      <span>Haches</span>
    </label>
    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
      <input type="checkbox" id="levelup" onchange="updateDuration()">
      <span>Level Up</span>
    </label>
  </label>

  <label>Nombre de consommations</label>
  <input type="number" id="consumptions">

  <label>Prix de la note en cours (€)</label>
  <input type="number" step="0.01" id="bill">

  <button onclick="calculate()">Calculer</button>
  <button class="reset-btn" onclick="resetFields()">
    Reset
  </button>

  <div class="result" id="details"></div>
  <div class="highlight" id="final"></div>
</div>

<script src="JS/script.js?v=20260430120000"></script>

</body>
</html>
